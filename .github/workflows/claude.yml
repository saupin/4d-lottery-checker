name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    # Skip bot-authored comments to prevent re-triggering after Claude posts its own "finished" comment
    if: >
      github.event_name == 'issues' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'issue_comment' &&
       !contains(github.event.comment.user.login, '[bot]') &&
       github.event.comment.user.type != 'Bot')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Auto-merge Claude branch to master
        id: merge
        if: steps.claude.outcome == 'success'
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          git fetch origin
          BRANCH=$(git branch -r | grep "origin/claude/issue-${ISSUE_NUM}-" | sed 's|.*origin/||' | sort | tail -1)
          if [ -z "$BRANCH" ]; then
            echo "No claude branch found for issue #${ISSUE_NUM}, skipping merge."
            exit 0
          fi
          # Skip if this branch is already in master
          if git merge-base --is-ancestor "origin/$BRANCH" origin/master; then
            echo "Branch $BRANCH already merged, nothing to do."
            exit 0
          fi
          echo "Merging $BRANCH into master"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git checkout -B master origin/master
          git merge "origin/$BRANCH" --no-edit
          git push origin master
          echo "Merge complete."

      - name: Notify Telegram
        if: always() && steps.claude.outcome != 'skipped'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_telegram.py
