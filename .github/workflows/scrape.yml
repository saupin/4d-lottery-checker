name: Daily 4D Scraper

on:
  schedule:
    # Run daily at 13:00 UTC (9:00 PM MYT) to catch regular and special draws
    - cron: '0 13 * * *'
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape latest draw
        run: python scraper.py --save lot_results.json

      - name: Commit results if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lot_results.json
          if git diff --cached --quiet; then
            echo "No new results to commit."
            echo "new_results=false" >> $GITHUB_OUTPUT
          else
            DATE=$(python -c "import json; d=json.load(open('lot_results.json')); print(sorted(d.keys())[-1])")
            git commit -m "Results: ${DATE}"
            git push
            echo "new_results=true"  >> $GITHUB_OUTPUT
            echo "draw_date=${DATE}" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram
        if: steps.commit.outputs.new_results == 'true' || github.event_name == 'workflow_dispatch'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ steps.commit.outputs.new_results }}" == "true" ]; then
            DATE="${{ steps.commit.outputs.draw_date }}"
            MSG="✅ 4D results scraped for ${DATE}%0ADAMACAI · MAGNUM · SPORTSTOTO results are now live."
          else
            MSG="🔔 Telegram test — bot is working correctly!"
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="${MSG}"
