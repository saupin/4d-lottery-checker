name: Daily 4D Scraper

on:
  schedule:
    # Run daily at 11:30 UTC (7:30 PM MYT) to catch regular and special draws
    - cron: '30 11 * * *'
  workflow_dispatch:         # allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 flask werkzeug

      - name: Scrape latest draw
        run: python scraper.py --save lot_results.json

      - name: Commit results if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lot_results.json
          if git diff --cached --quiet; then
            echo "No new results to commit."
            echo "new_results=false" >> $GITHUB_OUTPUT
          else
            DATE=$(python -c "import json; d=json.load(open('lot_results.json')); print(sorted(d.keys())[-1])")
            git commit -m "Results: ${DATE}"
            git push
            echo "new_results=true"  >> $GITHUB_OUTPUT
            echo "draw_date=${DATE}" >> $GITHUB_OUTPUT
          fi

      - name: Generate and store predictions
        if: steps.commit.outputs.new_results == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SECRET_KEY:   predict-store-dummy
        run: python predict_store.py

      - name: Notify Telegram on success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NEW_RESULTS: ${{ steps.commit.outputs.new_results }}
          DRAW_DATE:   ${{ steps.commit.outputs.draw_date }}
        run: |
          python3 - <<'EOF'
          import os, requests
          from datetime import datetime, timezone

          bot_token   = os.environ["BOT_TOKEN"]
          chat_id     = os.environ["CHAT_ID"]
          new_results = os.environ.get("NEW_RESULTS") == "true"
          draw_date   = os.environ.get("DRAW_DATE", "")

          if new_results:
              lines = [
                  f"✅ 4D draw results saved for {draw_date}",
                  "DAMACAI · MAGNUM · SPORTSTOTO are now live.",
              ]
              summary = "/tmp/predict_summary.txt"
              if os.path.exists(summary):
                  labels = {"all": "All", "damacai": "DAMACAI", "magnum": "MAGNUM", "toto": "SPORTSTOTO"}
                  lines.append("")
                  lines.append("🎯 Top 10 predictions for next draw:")
                  for line in open(summary):
                      key, _, nums = line.strip().partition("=")
                      label = labels.get(key, key)
                      lines.append(f"{label}: {nums}")
          else:
              today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
              lines = [f"ℹ️ No draw today ({today}) — no new results to save."]

          requests.post(
              f"https://api.telegram.org/bot{bot_token}/sendMessage",
              json={"chat_id": chat_id, "text": "\n".join(lines)},
          )
          EOF

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="❌ 4D scraper FAILED on ${TODAY} — check GitHub Actions logs."
